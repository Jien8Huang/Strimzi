name: validate-manifests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  kustomize-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.7.1
        run: |
          set -euo pipefail
          url="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "$url" -o /tmp/kustomize.tgz
          sudo tar xzf /tmp/kustomize.tgz -C /usr/local/bin kustomize
          kustomize version

      - name: kustomize build (clusters/dev, infrastructure, apps)
        run: |
          kustomize build clusters/dev >/dev/null
          kustomize build infrastructure >/dev/null
          kustomize build apps/kafka-dev >/dev/null

      - name: Flux path sanity script
        run: bash tests/scripts/check-flux-paths.sh
